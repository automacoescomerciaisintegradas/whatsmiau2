<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Tickets - WhatsMiau2</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
</head>

<body data-theme="light">

    <div class="d-flex" id="wrapper">

        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-center">
                <i class="fas fa-robot"></i> WhatsMiau2
            </div>
            <div class="list-group list-group-flush mt-3">
                <a href="/dashboard" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                </a>

                <a href="/connections" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-wifi me-2"></i> Conexões
                </a>

                <a href="/disparador" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-paper-plane me-2"></i> Disparador
                </a>

                <a href="/exportar-contatos" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-file-export me-2"></i> Exportar Contatos
                </a>

                <a href="/resumo-grupos" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-chart-bar me-2"></i> Resumo de Grupos
                </a>

                <a href="/contacts" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-address-book me-2"></i> Contatos
                </a>

                <a href="/tickets" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-ticket-alt me-2"></i> Tickets
                </a>

                <a href="/kanban" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-columns me-2"></i> Kanban
                </a>

                <a href="/internal-chat" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-comments me-2"></i> Chat Interno
                </a>

                <div class="border-top my-3"></div>

                <a href="/settings" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-cog me-2"></i> Configurações
                </a>

            </div>

            <a href="/logout" class="list-group-item list-group-item-action bg-transparent text-danger mt-auto">
                <i class="fas fa-sign-out-alt me-2"></i> Sair
            </a>
        </div>
    </div>

    <!-- Page Content -->
    <div id="page-content-wrapper">

        <nav class="navbar navbar-expand-lg navbar-custom px-4">
            <div class="d-flex align-items-center w-100 justify-content-between">
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-secondary me-3" id="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h5 class="mb-0 fw-bold">Gestão de Tickets</h5>
                </div>
                <button class="btn btn-primary shadow-sm fw-bold px-4" data-bs-toggle="modal"
                    data-bs-target="#modalNewTicket">
                    <i class="fas fa-plus me-2"></i> NOVO TICKET
                </button>
            </div>
        </nav>

        <div class="responsive-container">
            <div class="card p-4 shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle custom-table">
                        <thead>
                            <tr>
                                <th>Lead/Cliente</th>
                                <th>Última Mensagem</th>
                                <th>Status</th>
                                <th>Prioridade</th>
                                <th>Última Ativ.</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tickets-tbody">
                            <!-- Dinâmico -->
                            <tr>
                                <td colspan="6" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status"></div>
                                    <div class="mt-3 text-muted">Carregando seus tickets...</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Modal: New Ticket -->
    <div class="modal fade" id="modalNewTicket" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Abrir Novo Ticket</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Nome do Cliente*</label>
                        <input type="text" id="new-ticket-name" class="form-control" placeholder="Ex: João Silva">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase opacity-75">WhatsApp/Número*</label>
                        <input type="text" id="new-ticket-phone" class="form-control" placeholder="5511999998888">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Assunto/Problema*</label>
                        <textarea id="new-ticket-subject" class="form-control" rows="3"
                            placeholder="Descreva brevemente..."></textarea>
                    </div>
                    <div>
                        <label class="form-label small fw-bold text-uppercase opacity-75">Prioridade</label>
                        <select id="new-ticket-priority" class="form-select">
                            <option value="BAIXA">Baixa</option>
                            <option value="MÉDIA" selected>Média</option>
                            <option value="ALTA">Alta</option>
                            <option value="CRÍTICA">Crítica</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0 justify-content-between">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary px-4 fw-bold" onclick="createTicket()">Criar
                        Ticket</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Theme Toggle
        const toggleSwitch = document.querySelector('#darkModeSwitch');
        const body = document.body;
        const wrapper = document.getElementById("wrapper");

        if (localStorage.getItem('theme') === 'dark') {
            body.setAttribute('data-theme', 'dark');
            toggleSwitch.checked = true;
        }

        function toggleTheme() {
            const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            toggleSwitch.checked = (theme === 'dark');
        }

        document.getElementById("menu-toggle").onclick = () => wrapper.classList.toggle("sb-sidenav-toggled");

        // Active Link
        const currentPath = window.location.pathname;
        document.querySelectorAll('.list-group-item').forEach(link => {
            if (link.getAttribute('href') === currentPath) link.classList.add('active');
        });

        // Ticket Logic
        let tickets = [];
        const socket = typeof io !== 'undefined' ? io() : null;

        async function loadTickets() {
            try {
                const res = await fetch('/v1/crm/tickets', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` }
                });
                const data = await res.json();
                tickets = data.tickets || [];
                renderTickets();
            } catch (err) {
                console.error("Erro ao carregar tickets", err);
            }
        }

        function renderTickets() {
            const tbody = document.getElementById('tickets-tbody');
            if (tickets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted small">Nenhum ticket encontrado.</td></tr>`;
                return;
            }

            tbody.innerHTML = tickets.map(ticket => {
                const statusClass = {
                    'NOVO': 'bg-primary bg-opacity-10 text-primary',
                    'PENDENTE': 'bg-warning bg-opacity-10 text-warning',
                    'ABERTO': 'bg-info bg-opacity-10 text-info',
                    'FECHADO': 'bg-success bg-opacity-10 text-success',
                    'EM ANDAMENTO': 'bg-success bg-opacity-10 text-success'
                }[ticket.status] || 'bg-secondary bg-opacity-10 text-secondary';

                const priorityClass = {
                    'ALTA': 'text-danger fw-bold',
                    'CRÍTICA': 'text-danger fw-800',
                    'BAIXA': 'text-success'
                }[ticket.priority] || 'text-muted';

                const time = new Date(ticket.lastActivity).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                return `
                    <tr>
                        <td>
                            <div class="fw-bold text-dark">${ticket.customerName}</div>
                            <div class="text-muted small">${ticket.customerPhone.split('@')[0]}</div>
                        </td>
                        <td>
                            <div class="text-truncate small" style="max-width: 250px;" title="${ticket.subject}">
                                ${ticket.subject}
                            </div>
                        </td>
                        <td><span class="badge ${statusClass} rounded-pill px-3">${ticket.status}</span></td>
                        <td><span class="small ${priorityClass}"><i class="fas fa-flag me-1"></i>${ticket.priority}</span></td>
                        <td class="small text-muted font-monospace">${time}</td>
                        <td class="text-end">
                            <div class="btn-group gap-2">
                                <button class="btn btn-light btn-sm rounded-circle shadow-sm border" onclick="updateStatus(${ticket.id}, 'PENDENTE')" title="Pendente">
                                    <i class="fas fa-clock text-warning"></i>
                                </button>
                                <button class="btn btn-light btn-sm rounded-circle shadow-sm border" onclick="updateStatus(${ticket.id}, 'FECHADO')" title="Resolver">
                                    <i class="fas fa-check text-success"></i>
                                </button>
                                <a href="/internal-chat?phone=${ticket.customerPhone.split('@')[0]}" class="btn btn-light btn-sm rounded-circle shadow-sm border" title="Conversar">
                                    <i class="fas fa-comments text-primary"></i>
                                </a>
                                <button class="btn btn-light btn-sm rounded-circle shadow-sm border" onclick="deleteTicket(${ticket.id})" title="Excluir">
                                    <i class="fas fa-trash text-danger"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function updateStatus(id, status) {
            try {
                await fetch(`/v1/crm/tickets/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('authToken')}`
                    },
                    body: JSON.stringify({ status })
                });
                loadTickets();
            } catch (err) {
                alert("Erro ao atualizar status");
            }
        }

        async function deleteTicket(id) {
            if (!confirm("Deseja excluir este ticket?")) return;
            try {
                await fetch(`/v1/crm/tickets/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` }
                });
                loadTickets();
            } catch (err) {
                alert("Erro ao excluir ticket");
            }
        }

        if (socket) {
            socket.on('ticket-update', (updatedTicket) => {
                loadTickets();
            });
        }

        async function createTicket() {
            const name = document.getElementById('new-ticket-name').value;
            const phone = document.getElementById('new-ticket-phone').value;
            const subject = document.getElementById('new-ticket-subject').value;
            const priority = document.getElementById('new-ticket-priority').value;

            if (!name || !phone || !subject) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            try {
                const res = await fetch('/v1/crm/tickets', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('authToken')}`
                    },
                    body: JSON.stringify({ customerName: name, customerPhone: phone, subject, priority })
                });

                if (res.ok) {
                    document.getElementById('new-ticket-name').value = '';
                    document.getElementById('new-ticket-phone').value = '';
                    document.getElementById('new-ticket-subject').value = '';

                    const modal = bootstrap.Modal.getInstance(document.getElementById('modalNewTicket'));
                    if (modal) modal.hide();

                    loadTickets();
                } else {
                    const error = await res.json();
                    alert("Erro ao criar ticket: " + (error.error || "Erro desconhecido"));
                }
            } catch (err) {
                alert("Erro ao criar ticket");
            }
        }

        loadTickets();
        setInterval(loadTickets, 30000);
    </script>
</body>

</html>
