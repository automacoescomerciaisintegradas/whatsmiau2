<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM & Kanban - WhatsMiau2</title>

    <!-- Standard Platform CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">

    <style>
        /* CRM Specific Styles - Adapted for Bootstrap & Dark Mode */
        .kanban-board {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding-bottom: 24px;
            height: calc(100vh - 140px);
        }

        .kanban-column {
            flex: 1;
            min-width: 300px;
            background: rgba(255, 255, 255, 0.5);
            /* Light mode default */
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        [data-theme="dark"] .kanban-column {
            background: rgba(30, 41, 59, 0.4);
        }

        .kanban-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
            background: inherit;
        }

        .kanban-body {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .kanban-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            cursor: grab;
            transition: all 0.2s;
            position: relative;
            color: var(--text-color);
        }

        .kanban-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        [data-theme="dark"] .kanban-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        /* Stats Cards Override */
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body data-theme="dark">

    <div class="d-flex" id="wrapper">

        <!-- Sidebar (Standard) -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-center">
                <i class="fas fa-robot"></i> WhatsMiau2
            </div>
            <div class="list-group list-group-flush mt-3">
                <a href="/dashboard" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                </a>
                <a href="/connections" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-wifi me-2"></i> Conexões
                </a>
                <a href="/disparador" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-paper-plane me-2"></i> Disparador
                </a>
                <a href="/exportar-contatos" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-file-export me-2"></i> Exportar Contatos
                </a>
                <a href="/resumo-grupos" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-chart-bar me-2"></i> Resumo de Grupos
                </a>
                <a href="/contacts" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-address-book me-2"></i> Contatos
                </a>

                <!-- Active CRM Link -->
                <a href="/crm-new.html" class="list-group-item list-group-item-action bg-transparent active">
                    <i class="fas fa-columns me-2"></i> CRM & Kanban
                </a>

                <a href="/tickets" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-ticket-alt me-2"></i> Tickets
                </a>

                <div class="border-top my-3"></div>

                <a href="/settings" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-cog me-2"></i> Configurações
                </a>
                <a href="/logout" class="list-group-item list-group-item-action bg-transparent text-danger mt-auto">
                    <i class="fas fa-sign-out-alt me-2"></i> Sair
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">

            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-custom px-4">
                <div class="d-flex align-items-center w-100 justify-content-between">
                    <div class="d-flex align-items-center">
                        <button class="btn btn-outline-secondary me-3" id="menu-toggle">
                            <i class="fas fa-bars"></i>
                        </button>
                        <h4 class="mb-0 fw-bold text-dark" id="pageTitle">Pipeline de Vendas</h4>
                    </div>

                    <!-- Filter / Actions in Navbar -->
                    <div class="d-flex gap-2">
                        <select class="form-select form-select-sm" id="viewSelector" style="width: auto;">
                            <option value="kanban">Visualização Kanban</option>
                            <option value="list">Visualização Lista</option>
                            <option value="dashboard">Dashboard</option>
                        </select>
                        <button class="btn btn-primary btn-sm" onclick="openModal('modalAddLead')">
                            <i class="fas fa-plus"></i> Novo Lead
                        </button>
                    </div>
                </div>
            </nav>

            <!-- Main Content Area -->
            <div class="container-fluid content px-4 py-4">

                <!-- Dashboard View -->
                <section id="view-dashboard" class="view-section">
                    <div class="row g-4 mb-4">
                        <div class="col-md-3">
                            <div class="stat-card">
                                <small class="text-muted text-uppercase fw-bold">Total de Leads</small>
                                <h2 class="display-6 fw-bold text-primary mb-0" id="statTotal">0</h2>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card">
                                <small class="text-muted text-uppercase fw-bold">Novos Leads</small>
                                <h2 class="display-6 fw-bold text-info mb-0" id="statNovos">0</h2>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card">
                                <small class="text-muted text-uppercase fw-bold">Em Negociação</small>
                                <h2 class="display-6 fw-bold text-warning mb-0" id="statNegociacao">0</h2>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card">
                                <small class="text-muted text-uppercase fw-bold">Fechados</small>
                                <h2 class="display-6 fw-bold text-success mb-0" id="statFechados">0</h2>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Kanban View -->
                <section id="view-kanban" class="view-section active">
                    <div class="kanban-board">
                        <!-- Novo -->
                        <div class="kanban-column" data-status="novo">
                            <div class="kanban-header">
                                <div><i class="fas fa-circle text-info me-2"></i> Novo</div>
                                <span class="badge bg-secondary rounded-pill" id="count-novo">0</span>
                            </div>
                            <div class="kanban-body" id="col-novo" ondrop="drop(event)" ondragover="allowDrop(event)">
                            </div>
                        </div>

                        <!-- Em Contato -->
                        <div class="kanban-column" data-status="contato">
                            <div class="kanban-header">
                                <div><i class="fas fa-circle text-primary me-2"></i> Em Contato</div>
                                <span class="badge bg-secondary rounded-pill" id="count-contato">0</span>
                            </div>
                            <div class="kanban-body" id="col-contato" ondrop="drop(event)"
                                ondragover="allowDrop(event)"></div>
                        </div>

                        <!-- Negociação -->
                        <div class="kanban-column" data-status="negociacao">
                            <div class="kanban-header">
                                <div><i class="fas fa-circle text-warning me-2"></i> Negociação</div>
                                <span class="badge bg-secondary rounded-pill" id="count-negociacao">0</span>
                            </div>
                            <div class="kanban-body" id="col-negociacao" ondrop="drop(event)"
                                ondragover="allowDrop(event)"></div>
                        </div>

                        <!-- Fechado -->
                        <div class="kanban-column" data-status="fechado">
                            <div class="kanban-header">
                                <div><i class="fas fa-circle text-success me-2"></i> Fechado</div>
                                <span class="badge bg-secondary rounded-pill" id="count-fechado">0</span>
                            </div>
                            <div class="kanban-body" id="col-fechado" ondrop="drop(event)"
                                ondragover="allowDrop(event)"></div>
                        </div>
                    </div>
                </section>

                <!-- List View -->
                <section id="view-list" class="view-section">
                    <div class="card">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <div id="leadsTableContainer"></div>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <!-- Modal Layouts (Bootstrap) -->
    <div class="modal fade" id="modalAddLead" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Lead</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formAddLead">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" name="nome" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">WhatsApp</label>
                            <input type="text" class="form-control" name="whatsapp" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Empresa / Contexto</label>
                            <input type="text" class="form-control" name="empresa">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Salvar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Toggle Sidebar
        var el = document.getElementById("wrapper");
        var toggleButton = document.getElementById("menu-toggle");

        toggleButton.onclick = function () {
            el.classList.toggle("toggled");
        };

        // View Selector
        document.getElementById('viewSelector').addEventListener('change', (e) => {
            const view = e.target.value;
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));

            if (view === 'dashboard') {
                document.getElementById('view-dashboard').classList.add('active');
            } else if (view === 'kanban') {
                document.getElementById('view-kanban').classList.add('active');
            } else if (view === 'list') {
                document.getElementById('view-list').classList.add('active');
            }
        });

        // --- CRM LOGIC (Adapted) ---
        const API_BASE = '/api';
        const API_KEY = '2wtLvtb20wXePp8D9uRhm55aCjINiciO';
        const socket = io();

        let leads = [];

        socket.on('connect', () => console.log('🔌 CRM Real-time Active'));
        socket.on('ticket-update', () => { loadLeads(); loadStats(); });
        socket.on('kanban-move', () => { loadLeads(); loadStats(); });

        async function loadLeads() {
            try {
                const res = await fetch(`${API_BASE}/tickets`, { headers: { 'apikey': API_KEY } });
                const data = await res.json();
                if (data.tickets) {
                    leads = data.tickets.map(t => ({
                        id: t.id,
                        nome: t.customerName || 'Sem Nome',
                        whatsapp: t.customerPhone,
                        empresa: t.subject,
                        status: mapBackendStatusToFrontend(t.status),
                        temperatura: mapPriorityToTemp(t.priority)
                    }));
                    renderKanban();
                    renderTable();
                    calculateStats();
                }
            } catch (e) { console.error(e); }
        }

        function mapBackendStatusToFrontend(status) {
            const map = { 'NOVO': 'novo', 'ABERTO': 'contato', 'PENDENTE': 'negociacao', 'FECHADO': 'fechado', 'RESOLVIDO': 'fechado' };
            return map[status] || 'novo';
        }
        function mapFrontendStatusToBackend(status) {
            const map = { 'novo': 'NOVO', 'contato': 'ABERTO', 'negociacao': 'PENDENTE', 'fechado': 'FECHADO' };
            return map[status] || 'NOVO';
        }
        function mapPriorityToTemp(p) {
            return p === 'ALTA' ? 'quente' : (p === 'BAIXA' ? 'frio' : 'morno');
        }

        function renderKanban() {
            ['novo', 'contato', 'negociacao', 'fechado'].forEach(s => {
                const col = document.getElementById(`col-${s}`);
                const count = document.getElementById(`count-${s}`);
                col.innerHTML = '';

                const filtered = leads.filter(l => l.status === s);
                count.innerText = filtered.length;

                filtered.forEach(lead => {
                    const card = document.createElement('div');
                    card.className = 'kanban-card mb-3';
                    card.draggable = true;
                    card.ondragstart = (e) => e.dataTransfer.setData("text", lead.id);
                    card.innerHTML = `
                        <div class="d-flex justify-content-between">
                            <strong>${lead.nome}</strong>
                            <small class="text-muted"><i class="fab fa-whatsapp"></i></small>
                        </div>
                        <div class="small text-truncate text-muted mb-2">${lead.empresa || '-'}</div>
                        <div class="d-flex justify-content-between align-items-center">
                             <span class="badge bg-dark bg-opacity-25 text-body border">${lead.temperatura}</span>
                             <button class="btn btn-sm btn-link p-0 text-muted" onclick="openLead(${lead.id})"><i class="fas fa-external-link-alt"></i></button>
                        </div>
                    `;
                    col.appendChild(card);
                });
            });
        }

        function renderTable() {
            const container = document.getElementById('leadsTableContainer');
            container.innerHTML = `
                <table class="table table-hover mb-0">
                    <thead class="table-light"><tr><th>Nome</th><th>WhatsApp</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody>
                        ${leads.map(l => `
                            <tr>
                                <td>${l.nome}<br><small class="text-muted">${l.empresa || ''}</small></td>
                                <td>${l.whatsapp}</td>
                                <td><span class="badge bg-secondary">${l.status}</span></td>
                                <td><button class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
             `;
        }

        function calculateStats() {
            document.getElementById('statTotal').innerText = leads.length;
            document.getElementById('statNovos').innerText = leads.filter(l => l.status === 'novo').length;
            document.getElementById('statNegociacao').innerText = leads.filter(l => l.status === 'negociacao').length;
            document.getElementById('statFechados').innerText = leads.filter(l => l.status === 'fechado').length;
        }

        // Drag & Drop
        function allowDrop(ev) { ev.preventDefault(); }
        async function drop(ev) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("text");
            let target = ev.target;
            while (!target.classList.contains('kanban-column')) target = target.parentElement;

            const newStatus = target.dataset.status;
            const lead = leads.find(l => l.id == id);

            if (lead && lead.status !== newStatus) {
                const old = lead.status;
                lead.status = newStatus;
                renderKanban();

                try {
                    await fetch(`${API_BASE}/tickets/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'apikey': API_KEY },
                        body: JSON.stringify({ status: mapFrontendStatusToBackend(newStatus) })
                    });
                } catch (e) {
                    lead.status = old; renderKanban(); alert('Erro ao mover');
                }
            }
        }

        // Modal & Form
        const modalAddLead = new bootstrap.Modal(document.getElementById('modalAddLead'));
        window.openModal = (id) => modalAddLead.show();

        document.getElementById('formAddLead').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            try {
                await fetch(`${API_BASE}/tickets`, { // We use tickets as leads
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': API_KEY },
                    body: JSON.stringify({
                        customerPhone: fd.get('whatsapp'),
                        customerName: fd.get('nome'),
                        subject: fd.get('empresa') || 'Novo Lead Manual',
                        status: 'NOVO',
                        priority: 'MÉDIA'
                    })
                });
                modalAddLead.hide();
                e.target.reset();
                loadLeads();
            } catch (err) { alert('Erro ao salvar'); }
        });

        // Start
        loadLeads();

    </script>
</body>

</html>
