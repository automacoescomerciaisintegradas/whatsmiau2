<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - WhatsMiau2</title>

    <meta name="description" content="Crie sua conta WhatsMiau2 - Plataforma de automação WhatsApp">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link href="/assets/css/style.css" rel="stylesheet">
    <link href="/assets/css/auth.css" rel="stylesheet">
</head>

<body data-theme="light">
    <div id="notification-container" class="notification-container"></div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <h1>Criar Conta</h1>
                <p>Comece gratuitamente hoje</p>
            </div>

            <!-- Register Form -->
            <form id="register-form">
                <!-- Name -->
                <div class="auth-form-group">
                    <label for="name">Nome completo</label>
                    <div class="auth-input-wrapper">
                        <input type="text" id="name" name="name" class="auth-input" placeholder="Seu nome" required
                            autocomplete="name">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <!-- Email -->
                <div class="auth-form-group">
                    <label for="email">Email</label>
                    <div class="auth-input-wrapper">
                        <input type="email" id="email" name="email" class="auth-input" placeholder="seu@email.com"
                            required autocomplete="email">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <!-- Password -->
                <div class="auth-form-group">
                    <label for="password">Senha</label>
                    <div class="auth-input-wrapper">
                        <input type="password" id="password" name="password" class="auth-input"
                            placeholder="Mínimo 6 caracteres" required autocomplete="new-password" minlength="6">
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle"
                            onclick="togglePassword('password', 'toggle-icon-1')">
                            <i class="fas fa-eye" id="toggle-icon-1"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="auth-form-group">
                    <label for="confirm-password">Confirmar senha</label>
                    <div class="auth-input-wrapper">
                        <input type="password" id="confirm-password" name="confirm-password" class="auth-input"
                            placeholder="Repita a senha" required autocomplete="new-password">
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle"
                            onclick="togglePassword('confirm-password', 'toggle-icon-2')">
                            <i class="fas fa-eye" id="toggle-icon-2"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="auth-btn auth-btn-primary" id="register-btn">
                    <i class="fas fa-user-plus"></i>
                    Criar Conta
                </button>
            </form>

            <!-- Login Link -->
            <div class="auth-footer">
                Já tem uma conta? <a href="/login.html">Fazer login</a>
            </div>
        </div>
    </div>

    <script src="/assets/js/notifications.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Apply saved theme
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.body.setAttribute('data-theme', savedTheme);
            }
        });
    </script>
</body>

</html>
