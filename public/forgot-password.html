<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - WhatsMiau2</title>

    <meta name="description" content="Recupere sua senha WhatsMiau2">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link href="/assets/css/style.css" rel="stylesheet">
    <link href="/assets/css/auth.css" rel="stylesheet">
</head>

<body data-theme="light">
    <div id="notification-container" class="notification-container"></div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h1>Esqueceu a senha?</h1>
                <p>Enviaremos instruções para seu email</p>
            </div>

            <!-- Forgot Password Form -->
            <form id="forgot-form">
                <!-- Email -->
                <div class="auth-form-group">
                    <label for="email">Email cadastrado</label>
                    <div class="auth-input-wrapper">
                        <input type="email" id="email" name="email" class="auth-input" placeholder="seu@email.com"
                            required autocomplete="email">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="auth-btn auth-btn-primary" id="forgot-btn">
                    <i class="fas fa-paper-plane"></i>
                    Enviar Instruções
                </button>
            </form>

            <!-- Back to Login -->
            <div class="auth-footer">
                Lembrou a senha? <a href="/login.html">Fazer login</a>
            </div>
        </div>
    </div>

    <script src="/assets/js/notifications.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.body.setAttribute('data-theme', savedTheme);
            }
        });
    </script>
</body>

</html>
