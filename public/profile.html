<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - WhatsMiau2</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link href="/assets/css/style.css" rel="stylesheet">
    <link href="/assets/css/auth.css" rel="stylesheet">
    <style>
        .profile-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            padding: 2rem;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        [data-theme="dark"] .profile-card {
            background: rgba(30, 41, 59, 0.95);
            border-color: var(--border-color);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.25rem;
        }

        .profile-email {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .profile-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .profile-status i {
            font-size: 0.5rem;
        }

        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .profile-btn {
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .profile-btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #059669);
            color: white;
            border: none;
        }

        .profile-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .profile-btn-outline {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--border-color);
        }

        .profile-btn-outline:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .profile-btn-danger {
            background: transparent;
            color: #ef4444;
            border: 2px solid #ef4444;
        }

        .profile-btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        .profile-divider {
            height: 1px;
            background: var(--border-color);
            margin: 1rem 0;
        }

        /* Delete Confirmation Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-color);
            border-radius: 16px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        [data-theme="dark"] .modal-content {
            background: var(--card-bg);
        }

        .modal-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .modal-text {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .modal-buttons button {
            flex: 1;
        }
    </style>
</head>

<body data-theme="light">
    <div id="notification-container" class="notification-container"></div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="modal-title">Apagar conta?</h3>
            <p class="modal-text">Esta ação é irreversível. Todos os seus dados serão apagados permanentemente.</p>
            <div class="modal-buttons">
                <button class="profile-btn profile-btn-outline" onclick="closeDeleteModal()">
                    Cancelar
                </button>
                <button class="profile-btn profile-btn-danger" id="confirm-delete-btn" onclick="confirmDeleteAccount()">
                    <i class="fas fa-trash"></i> Apagar
                </button>
            </div>
        </div>
    </div>

    <div class="profile-container">
        <div class="profile-card">
            <!-- Avatar -->
            <div class="profile-avatar" id="profile-avatar">
                <i class="fas fa-user"></i>
            </div>

            <!-- User Info -->
            <h1 class="profile-name" id="profile-name">Carregando...</h1>
            <p class="profile-email" id="profile-email">-</p>

            <!-- Status -->
            <div class="profile-status">
                <i class="fas fa-circle"></i>
                Você está logado
            </div>

            <!-- Actions -->
            <div class="profile-actions">
                <a href="/subscription.html" class="profile-btn profile-btn-primary">
                    <i class="fas fa-credit-card"></i>
                    Ir para Planos e Checkout
                </a>

                <button class="profile-btn profile-btn-outline" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Deslogar
                </button>

                <div class="profile-divider"></div>

                <button class="profile-btn profile-btn-danger" onclick="showDeleteModal()">
                    <i class="fas fa-trash"></i>
                    Apagar minha conta
                </button>
            </div>
        </div>
    </div>

    <script src="/assets/js/notifications.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        function renderProfileUser(user) {
            if (!user) return;

            document.getElementById('profile-name').textContent = user.name || 'Usuário';
            document.getElementById('profile-email').textContent = user.email || '';

            const avatar = document.getElementById('profile-avatar');
            if (user.avatar_url) {
                avatar.innerHTML = `<img src="${user.avatar_url}" alt="${user.name}">`;
            } else if (user.name) {
                avatar.innerHTML = user.name.charAt(0).toUpperCase();
            } else {
                avatar.innerHTML = '<i class="fas fa-user"></i>';
            }
        }

        // Load user profile
        document.addEventListener('DOMContentLoaded', async () => {
            // Check authentication
            if (!requireAuth()) return;

            // Apply theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.body.setAttribute('data-theme', savedTheme);
            }

            // Load user data from cache first
            const user = getUser();
            renderProfileUser(user);

            // Fetch fresh profile data from API automatically
            try {
                const freshUser = await syncCurrentUser({ throwOnError: true });
                renderProfileUser(freshUser);
            } catch (error) {
                console.error('Error fetching user:', error);
            }
        });

        function showDeleteModal() {
            document.getElementById('delete-modal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.remove('active');
        }

        async function confirmDeleteAccount() {
            const btn = document.getElementById('confirm-delete-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="auth-spinner" style="border-color: rgba(239,68,68,0.3); border-top-color: #ef4444;"></div>';

            try {
                await deleteAccount();
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-trash"></i> Apagar';
                closeDeleteModal();
            }
        }

        // Close modal on overlay click
        document.getElementById('delete-modal').addEventListener('click', (e) => {
            if (e.target.id === 'delete-modal') {
                closeDeleteModal();
            }
        });
    </script>
</body>

</html>
