<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔌 Gerenciador de Instâncias - </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--bg-hover);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* Instances Grid */
        .instances-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .instance-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s;
        }

        .instance-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .instance-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
        }

        .instance-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
        }

        .instance-info {
            flex: 1;
        }

        .instance-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .instance-number {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .status-close {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-connecting {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .instance-body {
            padding: 20px;
        }

        .instance-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .instance-stat {
            text-align: center;
        }

        .instance-stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .instance-stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .instance-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* QR Code Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .qr-container img {
            max-width: 250px;
            width: 100%;
        }

        /* Create Instance Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opty: 0;
            }

            to {
                transform: translateX(0);
                opty: 1;
            }
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--danger);
        }

        .toast-info {
            border-left: 4px solid var(--info);
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .container {
                padding: 16px;
            }

            .instances-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Navigation Pills */
        .nav-pills {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--bg-card);
            padding: 8px;
            border-radius: var(--radius);
            width: fit-content;
        }

        .nav-pill {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-pill:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .nav-pill.active {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🔌 Gerenciador de Instâncias</h1>
        <div class="header-actions">
            <button class="btn btn-outline" onclick="location.href='/admin'">
                ⬅️ Voltar ao Admin
            </button>
            <button class="btn btn-primary" onclick="openCreateModal()">
                ➕ Nova Instância
            </button>
        </div>
    </div>

    <div class="container">
        <!-- Navigation -->
        <div class="nav-pills">
            <a href="/admin" class="nav-pill">📊 Dashboard</a>
            <a href="/instancias" class="nav-pill active">🔌 Instâncias</a>
            <a href="/disparador.html" class="nav-pill">📤 Disparador</a>
            <a href="/webhooks" class="nav-pill">🔗 Webhooks</a>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-instances">-</div>
                <div class="stat-label">Total de Instâncias</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="connected-instances">-</div>
                <div class="stat-label">Conectadas</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="disconnected-instances">-</div>
                <div class="stat-label">Desconectadas</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-messages">-</div>
                <div class="stat-label">Mensagens (24h)</div>
            </div>
        </div>

        <!-- Instances Grid -->
        <div class="instances-grid" id="instances-container">
            <div class="empty-state">
                <div class="spinner" style="margin: 0 auto 20px;"></div>
                <p>Carregando instâncias...</p>
            </div>
        </div>
    </div>

    <!-- Create Instance Modal -->
    <div class="modal" id="create-modal">
        <div class="modal-content">
            <h3 class="modal-title">➕ Criar Nova Instância</h3>
            <form id="create-form" onsubmit="createInstance(event)">
                <div class="form-group">
                    <label class="form-label">Nome da Instância *</label>
                    <input type="text" class="form-input" id="new-name" placeholder="minha-loja-01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Número (opcional)</label>
                    <input type="text" class="form-input" id="new-number" placeholder="5588999999999">
                </div>
                <div class="form-group">
                    <label class="form-label">Webhook URL (opcional)</label>
                    <input type="text" class="form-input" id="new-webhook" placeholder="https://seu-webhook.com">
                </div>
                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('create-modal')">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        ✨ Criar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div class="modal" id="qr-modal">
        <div class="modal-content">
            <h3 class="modal-title">📷 QR Code - <span id="qr-instance-name"></span></h3>
            <div class="qr-container">
                <div id="qr-loading" style="padding: 40px;">
                    <div class="spinner" style="margin: 0 auto;"></div>
                    <p style="margin-top: 16px; color: #666;">Gerando QR Code...</p>
                </div>
                <img id="qr-image" src="" alt="QR Code" style="display: none;">
            </div>
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">
                Escaneie o QR Code com o WhatsApp do celular
            </p>
            <button class="btn btn-outline" onclick="closeModal('qr-modal')" style="width: 100%;">
                Fechar
            </button>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // State
        let instances = [];
        let selectedInstance = localStorage.getItem('selectedInstance') || null;

        // API Base URL
        const API_BASE = '/api/instances';

        // ============================================
        // TOAST NOTIFICATIONS
        // ============================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ============================================
        // MODAL FUNCTIONS
        // ============================================
        function openCreateModal() {
            document.getElementById('create-modal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // ============================================
        // API FUNCTIONS
        // ============================================
        async function fetchInstances() {
            try {
                const response = await fetch('/api/instance/fetchInstances');
                const json = await response.json();

                if (Array.isArray(json)) {
                    instances = json;
                    renderInstances();
                    updateStats();
                } else if (json && json.success) {
                    instances = Array.isArray(json.data) ? json.data : [];
                    renderInstances();
                    updateStats();
                } else {
                    throw new Error((json && json.error) || 'Erro ao carregar instâncias ou resposta inválida do servidor');
                }
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('instances-container').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p>Erro ao carregar instâncias: ${error.message}</p>
                        <button class="btn btn-primary" onclick="fetchInstances()" style="margin-top: 20px;">
                            🔄 Tentar Novamente
                        </button>
                    </div>
                `;
            }
        }

        async function createInstance(event) {
            event.preventDefault();

            const name = document.getElementById('new-name').value.trim();
            const number = document.getElementById('new-number').value.trim();
            const webhook = document.getElementById('new-webhook').value.trim();

            if (!name) {
                showToast('Nome é obrigatório', 'error');
                return;
            }

            try {
                const response = await fetch('/api/instance/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instanceName: name,
                        number: number || undefined,
                        webhook: webhook || undefined,
                        integration: 'WHATSAPP-BAILEYS'
                    })
                });

                const json = await response.json();

                if (response.ok) {
                    showToast(`Instância "${name}" criada com sucesso!`, 'success');
                    closeModal('create-modal');
                    document.getElementById('create-form').reset();
                    fetchInstances();

                    // Se retornou QR Code, mostrar
                    if (json.qrcode?.base64) {
                        showQRCode(name, json.qrcode.base64);
                    }
                } else {
                    throw new Error(json.message || json.error || 'Erro ao criar instância');
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function connectInstance(instanceName) {
            try {
                const response = await fetch(`/api/instance/connect/${instanceName}`);
                const json = await response.json();

                if (json.qrcode?.base64) {
                    showQRCode(instanceName, json.qrcode.base64);
                } else if (json.state === 'open' || json.message?.includes('Already')) {
                    showToast(`${instanceName} já está conectada!`, 'info');
                    fetchInstances();
                } else if (response.ok) {
                    showToast(`Conectando ${instanceName}...`, 'info');
                    fetchInstances();
                } else {
                    throw new Error(json.message || json.error || 'Erro ao conectar');
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function disconnectInstance(instanceName) {
            if (!confirm(`Deseja desconectar a instância "${instanceName}"?`)) return;

            try {
                const response = await fetch(`/api/instance/logout/${instanceName}`, {
                    method: 'DELETE'
                });
                const json = await response.json();

                if (response.ok) {
                    showToast(`${instanceName} desconectada!`, 'success');
                    fetchInstances();
                } else {
                    throw new Error(json.message || json.error || 'Erro ao desconectar');
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function deleteInstance(instanceName) {
            if (!confirm(`⚠️ ATENÇÃO: Esta ação é irreversível!\n\nDeseja DELETAR a instância "${instanceName}"?`)) return;

            try {
                const response = await fetch(`/api/instance/delete/${instanceName}`, {
                    method: 'DELETE'
                });
                const json = await response.json();

                if (response.ok) {
                    showToast(`${instanceName} deletada!`, 'success');
                    if (selectedInstance === instanceName) {
                        selectedInstance = null;
                        localStorage.removeItem('selectedInstance');
                    }
                    fetchInstances();
                } else {
                    throw new Error(json.message || json.error || 'Erro ao deletar');
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function selectInstance(instanceName) {
            selectedInstance = instanceName;
            localStorage.setItem('selectedInstance', instanceName);
            showToast(`Instância "${instanceName}" selecionada!`, 'success');
            renderInstances();

            // Atualizar configuração global
            fetch('/api/admin/set-instance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instance: instanceName })
            });
        }

        // ============================================
        // QR CODE
        // ============================================
        function showQRCode(instanceName, base64) {
            document.getElementById('qr-instance-name').textContent = instanceName;
            document.getElementById('qr-loading').style.display = 'none';

            const img = document.getElementById('qr-image');
            img.src = base64.startsWith('data:') ? base64 : `data:image/png;base64,${base64}`;
            img.style.display = 'block';

            document.getElementById('qr-modal').classList.add('active');
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderInstances() {
            const container = document.getElementById('instances-container');

            if (instances.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📱</div>
                        <h3>Nenhuma instância encontrada</h3>
                        <p>Crie sua primeira instância para começar</p>
                        <button class="btn btn-primary" onclick="openCreateModal()" style="margin-top: 20px;">
                            ➕ Criar Instância
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = instances.map(inst => {
                // Handle both nested (inst.instance) and flat formats
                const data = inst.instance || inst;
                const name = data.instanceName || data.name || 'Sem nome';
                const state = data.status || data.connectionStatus || data.state || 'disconnected';
                const number = data.ownerJid?.replace('@s.whatsapp.net', '') || data.number || data.phoneNumber || '-';
                const isSelected = selectedInstance === name;
                const isConnected = state === 'open' || state === 'connected';

                return `
                    <div class="instance-card ${isSelected ? 'selected' : ''}">
                        <div class="instance-header">
                            <div class="instance-info">
                                <div class="instance-name">
                                    ${isSelected ? '⭐' : '📱'} ${name}
                                </div>
                                <div class="instance-number">📞 ${number}</div>
                            </div>
                            <span class="status-badge status-${state}">
                                ${isConnected ? '🟢 Online' : state === 'connecting' ? '🟡 Conectando' : '🔴 Offline'}
                            </span>
                        </div>
                        <div class="instance-body">
                            <div class="instance-stats">
                                <div class="instance-stat">
                                    <div class="instance-stat-value">${inst._count?.Message || 0}</div>
                                    <div class="instance-stat-label">Mensagens</div>
                                </div>
                                <div class="instance-stat">
                                    <div class="instance-stat-value">${inst._count?.Contact || 0}</div>
                                    <div class="instance-stat-label">Contatos</div>
                                </div>
                                <div class="instance-stat">
                                    <div class="instance-stat-value">${inst._count?.Chat || 0}</div>
                                    <div class="instance-stat-label">Chats</div>
                                </div>
                            </div>
                            <div class="instance-actions">
                                ${!isSelected ? `
                                    <button class="btn btn-primary btn-sm" onclick="selectInstance('${name}')">
                                        ⭐ Selecionar
                                    </button>
                                ` : `
                                    <button class="btn btn-outline btn-sm" disabled>
                                        ✅ Selecionada
                                    </button>
                                `}
                                ${isConnected ? `
                                    <button class="btn btn-outline btn-sm" onclick="disconnectInstance('${name}')">
                                        🔌 Desconectar
                                    </button>
                                ` : `
                                     <button class="btn btn-success btn-sm" onclick="connectInstance('${name}')">
                                         📷 QR Code
                                     </button>
                                     <button class="btn btn-primary btn-sm" onclick="location.href='/pairing.html?instance=${name}'">
                                         🔗 Pairing
                                     </button>
                                `}
                                <button class="btn btn-danger btn-sm" onclick="deleteInstance('${name}')">
                                    🗑️
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const total = instances.length;
            const connected = instances.filter(i =>
                (i.connectionStatus || i.state) === 'open'
            ).length;
            const disconnected = total - connected;
            const messages = instances.reduce((sum, i) => sum + (i._count?.Message || 0), 0);

            document.getElementById('total-instances').textContent = total;
            document.getElementById('connected-instances').textContent = connected;
            document.getElementById('disconnected-instances').textContent = disconnected;
            document.getElementById('total-messages').textContent = messages;
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            fetchInstances();

            // Refresh every 30 seconds
            setInterval(fetchInstances, 30000);
        });

        // Close modals on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>

</html>
