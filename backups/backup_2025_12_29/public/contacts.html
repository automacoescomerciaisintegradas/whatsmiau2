<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automações Integradas - Contatos</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
</head>

<body>

    <div class="d-flex" id="wrapper">

        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-center">
                <i class="fas fa-robot"></i> Automações
            </div>
            <div class="list-group list-group-flush mt-3">
                <a href="/dashboard" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                </a>

                <a href="/connections" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-wifi me-2"></i> Conexões
                </a>

                <a href="/disparador" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-paper-plane me-2"></i> Disparador
                </a>
                <a href="/resumo-grupos" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-chart-pie me-2"></i> Resumo Grupos
                </a>
                <a href="/internal-chat" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-comments me-2"></i> Chat Interno
                </a>
                <a href="/kanban" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-columns me-2"></i> Kanban
                </a>
                <a href="/tickets" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-ticket-alt me-2"></i> Tickets
                </a>

                <div class="border-top my-3"></div>

                <a href="/settings" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-cog me-2"></i> Configurações
                </a>

                <a href="/" class="list-group-item list-group-item-action bg-transparent text-danger mt-auto">
                    <i class="fas fa-sign-out-alt me-2"></i> Sair
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">

            <nav class="navbar navbar-expand-lg navbar-custom px-4">
                <div class="d-flex align-items-center w-100 justify-content-between">
                    <button class="btn btn-outline-secondary" id="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>

                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle text-dark"
                            id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=6610f2&color=fff" alt="user"
                                width="32" height="32" class="rounded-circle me-2">
                            <strong>Admin</strong>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownUser1">
                            <li><a class="dropdown-item" href="#">Perfil</a></li>
                            <li><a class="dropdown-item" href="#">Assinatura</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#">Sair</a></li>
                        </ul>
                    </div>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0">Gestão de Contatos</h2>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary"><i class="fas fa-file-import me-2"></i>
                            Importar</button>
                        <button class="btn btn-primary fw-bold"><i class="fas fa-plus me-2"></i> Novo Contato</button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm p-4">
                    <div class="input-group mb-4" style="max-width: 400px;">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i
                                class="fas fa-search"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0"
                            placeholder="Buscar por nome ou número...">
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="bg-light">
                                <tr>
                                    <th class="border-0">Nome</th>
                                    <th class="border-0">WhatsApp</th>
                                    <th class="border-0">Tags</th>
                                    <th class="border-0 text-end">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="fw-bold">João Silva</td>
                                    <td>5511999999999</td>
                                    <td><span class="badge bg-primary-subtle text-primary">CLIENTE</span></td>
                                    <td class="text-end">
                                        <button class="btn btn-light btn-sm"><i class="fas fa-comment"></i></button>
                                        <button class="btn btn-light btn-sm"><i class="fas fa-edit"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var el = document.getElementById("wrapper");
        var toggleButton = document.getElementById("menu-toggle");
        toggleButton.onclick = function () { el.classList.toggle("sb-sidenav-toggled"); };

        const currentPath = window.location.pathname;
        document.querySelectorAll('.list-group-item').forEach(link => {
            if (link.getAttribute('href') === currentPath) link.classList.add('active');
        });
    </script>

</body>

</html>
