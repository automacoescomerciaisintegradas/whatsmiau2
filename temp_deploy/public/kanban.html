<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban CRM - WhatsMiau2</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
    <style>
        .kanban-board {
            display: flex;
            gap: 1.25rem;
            overflow-x: auto;
            padding: 0.5rem;
            min-height: calc(100vh - 180px);
            align-items: flex-start;
        }

        .kanban-col {
            min-width: 320px;
            width: 320px;
            background: rgba(248, 250, 252, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            max-height: calc(100vh - 200px);
        }

        [data-theme="dark"] .kanban-col {
            background: rgba(15, 23, 42, 0.3);
        }

        .kanban-header {
            padding: 1.25rem;
            border-bottom: 2px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kanban-header h6 {
            margin: 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }

        .kanban-list {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            min-height: 151px;
        }

        .kanban-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] .kanban-card {
            background: #1e293b;
        }

        .kanban-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .kanban-card:active {
            cursor: grabbing;
        }

        .sortable-ghost {
            opacity: 0.4;
            background: var(--primary-color) !important;
            border: 2px dashed var(--primary-color);
        }

        .temp-badge {
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .temp-hot {
            background: #fee2e2;
            color: #ef4444;
        }

        .temp-warm {
            background: #fef3c7;
            color: #d97706;
        }

        .temp-cold {
            background: #dcfce7;
            color: #10b981;
        }

        /* Status Colors */
        .col-novo .kanban-header {
            border-bottom-color: #3b82f6;
        }

        .col-contato .kanban-header {
            border-bottom-color: #f59e0b;
        }

        .col-negociacao .kanban-header {
            border-bottom-color: #10b981;
        }

        .col-fechado .kanban-header {
            border-bottom-color: #6366f1;
        }

        .col-perdido .kanban-header {
            border-bottom-color: #94a3b8;
        }
    </style>
</head>

<body data-theme="light">

    <div class="d-flex" id="wrapper">

        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-center">
                <i class="fas fa-robot"></i> WhatsMiau2
            </div>
            <div class="list-group list-group-flush mt-3">
                <a href="/dashboard" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                </a>

                <a href="/connections" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-wifi me-2"></i> ConexÃµes
                </a>

                <a href="/disparador" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-paper-plane me-2"></i> Disparador
                </a>

                <a href="/exportar-contatos" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-file-export me-2"></i> Exportar Contatos
                </a>

                <a href="/resumo-grupos" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-chart-bar me-2"></i> Resumo de Grupos
                </a>

                <a href="/contacts" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-address-book me-2"></i> Contatos
                </a>

                <a href="/tickets" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-ticket-alt me-2"></i> Tickets
                </a>

                <a href="/kanban" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-columns me-2"></i> Kanban
                </a>

                <a href="/internal-chat" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-comments me-2"></i> Chat Interno
                </a>

                <div class="border-top my-3"></div>

                <a href="/settings" class="list-group-item list-group-item-action bg-transparent">
                    <i class="fas fa-cog me-2"></i> Configurações
                </a>

                </div>

                <a href="/logout" class="list-group-item list-group-item-action bg-transparent text-danger mt-auto">
                    <i class="fas fa-sign-out-alt me-2"></i> Sair
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">

            <nav class="navbar navbar-expand-lg navbar-custom px-4">
                <div class="d-flex align-items-center w-100 justify-content-between">
                    <div class="d-flex align-items-center">
                        <button class="btn btn-outline-secondary me-3" id="menu-toggle">
                            <i class="fas fa-bars"></i>
                        </button>
                        <h5 class="mb-0 fw-bold">Pipeline de Vendas</h5>
                    </div>
                    <button class="btn btn-primary shadow-sm fw-bold px-4" onclick="showAddLead()">
                        <i class="fas fa-plus me-2"></i> NOVO LEAD
                    </button>
                </div>
            </nav>

            <div class="responsive-container">
                <div class="kanban-board" id="board">
                    <!-- Column: Novo -->
                    <div class="kanban-col col-novo" data-status="novo">
                        <div class="kanban-header">
                            <h6 class="text-primary">Novos</h6>
                            <span class="badge bg-primary rounded-pill badge-count">0</span>
                        </div>
                        <div class="kanban-list" id="list-novo"></div>
                    </div>

                    <!-- Column: Contato -->
                    <div class="kanban-col col-contato" data-status="contato">
                        <div class="kanban-header">
                            <h6 class="text-warning">Em Contato</h6>
                            <span class="badge bg-warning rounded-pill badge-count">0</span>
                        </div>
                        <div class="kanban-list" id="list-contato"></div>
                    </div>

                    <!-- Column: Negociação -->
                    <div class="kanban-col col-negociacao" data-status="negociacao">
                        <div class="kanban-header">
                            <h6 class="text-success">Negociação</h6>
                            <span class="badge bg-success rounded-pill badge-count">0</span>
                        </div>
                        <div class="kanban-list" id="list-negociacao"></div>
                    </div>

                    <!-- Column: Fechado -->
                    <div class="kanban-col col-fechado" data-status="fechado">
                        <div class="kanban-header">
                            <h6 class="text-indigo" style="color: #6366f1;">Fechados</h6>
                            <span class="badge bg-indigo rounded-pill badge-count"
                                style="background-color: #6366f1 !important;">0</span>
                        </div>
                        <div class="kanban-list" id="list-fechado"></div>
                    </div>

                    <!-- Column: Perdido -->
                    <div class="kanban-col col-perdido" data-status="perdido">
                        <div class="kanban-header">
                            <h6 class="text-secondary">Perdidos</h6>
                            <span class="badge bg-secondary rounded-pill badge-count">0</span>
                        </div>
                        <div class="kanban-list" id="list-perdido"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        // API Configuration - Consistent with server.js
        const API_URL = '/api/leads';

        // Theme & Sidebar
        const toggleSwitch = document.querySelector('#darkModeSwitch');
        const body = document.body;
        const wrapper = document.getElementById("wrapper");

        if (localStorage.getItem('theme') === 'dark') {
            body.setAttribute('data-theme', 'dark');
            toggleSwitch.checked = true;
        }

        function toggleTheme() {
            const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            toggleSwitch.checked = (theme === 'dark');
        }

        document.getElementById("menu-toggle").onclick = () => wrapper.classList.toggle("sb-sidenav-toggled");

        // Active Link
        const currentPath = window.location.pathname;
        document.querySelectorAll('.list-group-item').forEach(link => {
            if (link.getAttribute('href') === currentPath) link.classList.add('active');
        });

        // Initialize Sortable on each list
        const statuses = ['novo', 'contato', 'negociacao', 'fechado', 'perdido'];
        statuses.forEach(status => {
            const el = document.getElementById(`list-${status}`);
            new Sortable(el, {
                group: 'kanban',
                animation: 200,
                easing: "cubic-bezier(1, 0, 0, 1)",
                ghostClass: 'sortable-ghost',
                onEnd: async function (evt) {
                    const leadId = evt.item.dataset.id;
                    const newStatus = evt.to.parentElement.dataset.status;
                    if (evt.from !== evt.to) {
                        try {
                            await fetch(`${API_URL}/${leadId}`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ status: newStatus })
                            });
                            updateCounts();
                        } catch (e) {
                            console.error("Error updating lead status:", e);
                            alert("Falha ao atualizar status");
                            fetchLeads(); // Refresh to correct state
                        }
                    }
                }
            });
        });

        async function fetchLeads() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data.success) {
                    renderLeads(data.leads);
                }
            } catch (e) {
                console.error("Error fetching leads:", e);
                statuses.forEach(s => document.getElementById(`list-${s}`).innerHTML = '<div class="text-center py-3 small text-danger">Erro ao carregar</div>');
            }
        }

        function renderLeads(leads) {
            statuses.forEach(s => document.getElementById(`list-${s}`).innerHTML = '');

            leads.forEach(lead => {
                const list = document.getElementById(`list-${lead.status}`) || document.getElementById('list-novo');

                let tempClass = 'temp-warm';
                if (lead.temperatura === 'quente') tempClass = 'temp-hot';
                else if (lead.temperatura === 'frio') tempClass = 'temp-cold';

                const card = `
                    <div class="kanban-card" data-id="${lead.id}">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                             <div class="fw-bold truncate-1" style="max-width: 140px;">${lead.nome}</div>
                             <span class="temp-badge ${tempClass}">${lead.temperatura || 'morno'}</span>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <i class="fab fa-whatsapp text-success me-2" style="font-size: 0.8rem;"></i>
                            <span class="text-muted small">${lead.whatsapp}</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center pt-2 border-top border-light">
                             <div class="fw-bold text-primary small">R$ ${parseFloat(lead.valor || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
                             <div class="d-flex gap-1">
                                <button class="btn btn-link btn-sm p-0 text-muted" onclick="openChat('${lead.whatsapp}')" title="Conversar"><i class="fas fa-comment-dots"></i></button>
                                <button class="btn btn-link btn-sm p-0 text-muted" onclick="editLead(${lead.id})" title="Editar"><i class="fas fa-edit"></i></button>
                             </div>
                        </div>
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', card);
            });
            updateCounts();
        }

        function updateCounts() {
            statuses.forEach(s => {
                const count = document.getElementById(`list-${s}`).children.length;
                document.querySelector(`[data-status="${s}"] .badge-count`).textContent = count;
            });
        }

        function showAddLead() {
            // Placeholder: In a real app, this would open a modal
            const name = prompt("Nome do Lead:");
            const phone = prompt("WhatsApp (com DDD):");
            if (!name || !phone) return;

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome: name, whatsapp: phone, status: 'novo', temperatura: 'morno' })
            }).then(() => fetchLeads());
        }

        function editLead(id) {
            alert("Edição de lead (ID: " + id + ") em desenvolvimento.");
        }

        function openChat(phone) {
            window.location.href = `/internal-chat?phone=${phone}`;
        }

        fetchLeads();
        // Refresh every 30s
        setInterval(fetchLeads, 30000);
    </script>
</body>

</html>
